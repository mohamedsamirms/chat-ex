<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-left">
                <h1>PUBLIC CHAT</h1>
                <div class="active-status">
                    <span class="dot"></span> <span id="active-count">0 ACTIVE</span>
                </div>
            </div>
            <div class="header-right" id="settings-btn">
                <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
                    <path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3-1.57-3-3.5s1.07-3.5 3-3.5 3 1.57 3 3.5-1.07 3.5-3 3.5z"/>
                </svg>
            </div>
        </header>

        <main id="chat-area">
            <div id="empty-state" class="empty-state">
                NO MESSAGES YET,<br>SAY HI
            </div>
            <ul id="messages"></ul>
        </main>

        <div id="typing-container">
            <div id="typing-indicator" class="hidden">SOMEONE IS TYPING</div>
        </div>

        <footer>
            <div class="footer-left-buttons">
                <button type="button" class="icon-circle-btn">+</button>
                <button type="button" class="gif-rect-btn">GIF</button>
            </div>
            <form id="chat-form">
                <input id="chat-input" type="text" placeholder="ENTER A MESSAGE HERE" autocomplete="off" />
                <button type="button" class="emoji-tray-btn">☺+</button>
                <button type="submit" class="send-btn">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </form>
        </footer>
    </div>

    <div id="username-modal" class="modal-overlay">
        <div class="modal">
            <h2>USERNAME*</h2>
            <form id="username-form" class="modal-input-group">
                <input type="text" id="username-input" required autocomplete="off">
                <button type="submit" class="btn-blue">BTN</button>
            </form>
        </div>
    </div>

    <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal">
            <h2>SETTINGS</h2>
            <form id="settings-form" class="modal-input-group">
                <input type="text" id="new-username-input" placeholder="CHANGE NAME" required autocomplete="off">
                <button type="submit" class="btn-blue">BTN</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
